jwt:
  secret: ${JWT_SECRET:TicketSystemSecretKey2026ForJWTTokenGeneration}

server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: ticket-gateway
  datasource:
    enabled: false

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**

        - id: biz-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/show/**, /api/ticket/**, /api/order/**, /api/seckill/**

        - id: frontend
          uri: http://localhost:3000
          predicates:
            - Path=/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

logging:
  level:
    org.springframework.cloud.gateway: debug

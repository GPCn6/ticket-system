jwt:
  secret: ${JWT_SECRET:ticket-system-dev-jwt-secret-ticket-system-dev-jwt-secret}

server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: ticket-gateway
  datasource:
    enabled: false

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/user/**

        - id: biz-service
          uri: ${BIZ_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/show/**, /api/ticket/**, /api/order/**, /api/seckill/**

        - id: frontend
          uri: ${FRONTEND_URL:http://localhost:3000}
          predicates:
            - Path=/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: Authorization,Content-Type,X-Requested-With
            allowCredentials: true
            maxAge: 3600

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

logging:
  level:
    org.springframework.cloud.gateway: info

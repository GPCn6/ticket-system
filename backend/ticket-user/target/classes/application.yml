server:
  port: 8081

spring:
  application:
    name: ticket-user

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ticket_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 1234

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  redisson:
    address: redis://localhost:6379
    database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/UserMapper.xml

jwt:
  secret: TicketSystemSecretKey2026ForJWTTokenGeneration
  expiration: 7200000

logging:
  level:
    com.ticket: debug
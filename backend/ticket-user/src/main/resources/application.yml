server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ticket-user

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ticket_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:1234}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

  redisson:
    address: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
    database: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/UserMapper.xml

jwt:
  secret: ${JWT_SECRET:TicketSystemSecretKey2026ForJWTTokenGeneration}
  expiration: ${JWT_EXPIRATION:7200000}

logging:
  level:
    com.ticket: ${LOG_LEVEL:debug}
